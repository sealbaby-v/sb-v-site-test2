<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage</title>
    <style>
        body {
            background-color: #EDEDED;
            color: #000000;
            font-family: Arial, sans-serif;
        }
        .box {
            border: 1px solid gray;
            background-color: white;
            padding: 15px;
            margin: 10px;
        }
        .accent {
            color: #008CC8;
        }
        .collapsible {
            cursor: pointer;
            padding: 10px;
            background-color: #eee;
            border: none;
            text-align: left;
            outline: none;
            font-size: 15px;
        }
        .active, .collapsible:hover {
            background-color: #ccc;
        }
        .content {
            padding: 0 15px;
            display: none;
            overflow: hidden;
            background-color: white;
        }
    </style>
</head>
<body>
    <nav class="box">
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
    </nav>
    <div class="box">
        <h1 class="accent">Table of Contents</h1>
        <ul>
            <li><a href="#section1">Section 1</a></li>
            <li><a href="#section2">Section 2</a></li>
            <li><a href="#section3">Section 3</a></li>
        </ul>
    </div>
    <div class="box">
        <button class="collapsible">Section 1</button>
        <div class="content">
            <p>Details about Section 1.</p>
        </div>
        <button class="collapsible">Section 2</button>
        <div class="content">
            <p>Details about Section 2.</p>
        </div>
        <button class="collapsible">Section 3</button>
        <div class="content">
            <p>Details about Section 3.</p>
        </div>
    </div>
    <div class="box">
        <h2 class="accent">Password-Protected Links</h2>
        <a href="#" onclick="promptPassword('link1')">Access Link 1</a><br>
        <a href="#" onclick="promptPassword('link2')">Access Link 2</a><br>
    </div>
    <script>
        var coll = document.getElementsByClassName("collapsible");
        for (let i = 0; i < coll.length; i++) {
            coll[i].addEventListener("click", function() {
                this.classList.toggle("active");
                var content = this.nextElementSibling;
                if (content.style.display === "block") {
                    content.style.display = "none";
                } else {
                    content.style.display = "block";
                }
            });
        }

        function promptPassword(link) {
            var password = prompt("Enter password:");
            if (password === "your_password") {
                alert("Access granted to " + link);
            } else {
                alert("Access denied.");
            }
        }
    </script>
</body>
</html>
